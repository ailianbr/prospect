# Stage stack. Each service gets unique container names, volume names, and
# network aliases (dev_ prefix) so they never collide with the prod stack on
# shared external networks (observability, dokploy-network).
#
# The bridge network is given an explicit name (listmonk_stage_bridge) to prevent
# Docker from assigning the same default name as prod's bridge, which caused
# DNS round-robin between prod and stage containers and intermittent
# "password authentication failed" errors from listmonk_db.

x-listmonk_db-credentials: &listmonk_db-credentials
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

services:

  api:
    image: ghcr.io/kerryhen/monk-api:dev
    container_name: dev_listmonk_api
    pull_policy: always
    environment:
      - LISTMONK_USER=${LISTMONK_USER}
      - LISTMONK_TOKEN=${LISTMONK_TOKEN}
      - LISTMONK_API_URL=${LISTMONK_API_URL}
      - POCKETBASE_BOT_EMAIL=${POCKETBASE_BOT_EMAIL}
      - POCKETBASE_BOT_PASSWORD=${POCKETBASE_BOT_PASSWORD}
      - POCKETBASE_API_URL=${POCKETBASE_API_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    expose:
      - 8000
    depends_on:
      - listmonk_app
      - pocketbase
    networks:
      bridge: null
      observability:
        aliases:
          - dev_listmonk_api
      dokploy-network:
        aliases:
          - dev_listmonk_api

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: dev_listmonk_api_db
    restart: unless-stopped
    command:
      - --encryptionEnv
      - ENCRYPTION
    environment:
      - ENCRYPTION=${PB_ENCRYPTION}
      - PB_INVITATION_PEPPER=${PB_INVITATION_PEPPER}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - ENVIROMENT=${ENVIROMENT}
    expose:
      - 8090
    volumes:
      - dev_listmonk_api_db:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      bridge: null
      observability:
        aliases:
          - dev_pocketbase
      dokploy-network:
        aliases:
          - dev_listmonk_api_db

  listmonk_app:
    image: listmonk/listmonk:v6.0.0
    container_name: dev_listmonk_app
    restart: unless-stopped
    expose:
      - 9000
    networks:
      bridge: null
      observability:
        aliases:
          - dev_listmonk_app
      dokploy-network:
        aliases:
          - dev_listmonk_app
    hostname: listmonk.ailian.com.br
    depends_on:
      - listmonk_db
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
    environment:
      LISTMONK_app__address: ${LISTMONK_APP_ADDRESS}
      LISTMONK_db__user: ${LISTMONK_DB_USER}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD}
      LISTMONK_db__database: ${LISTMONK_DB_DATABSE}
      LISTMONK_db__host: ${LISTMONK_DB_HOST}
      LISTMONK_db__port: ${LISTMONK_DB_PORT}
      LISTMONK_db__ssl_mode: ${LISTMONK_DB_SSL_MODE}
      LISTMONK_db__max_open: ${LISTMONK_DB_MAX_OPEN}
      LISTMONK_db__max_idle: ${LISTMONK_DB_MAX_IDLE}
      LISTMONK_db__max_lifetime: ${LISTMONK_DB_MAX_LIFETIME}
      TZ: Etc/UTC
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ./uploads:/listmonk/uploads:rw

  listmonk_db:
    image: postgres:17-alpine
    container_name: dev_listmonk_db
    restart: unless-stopped
    expose:
      - 5432
    networks:
      bridge: null
      dokploy-network:
        aliases:
          - dev_listmonk_db
    environment:
      <<: *listmonk_db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: dev_listmonk-data
        target: /var/lib/postgresql/data

networks:
  bridge:
    name: listmonk_stage_bridge
  observability:
    external: true
  dokploy-network:
    external: true

volumes:
  dev_listmonk_api_db:
  dev_listmonk-data:
