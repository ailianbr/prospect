# Stage stack. Each service gets unique container names, volume names, and
# network aliases (stg_ prefix) so they never collide with the prod stack on
# shared external networks (observability, dokploy-network).
#
# The bridge network is given an explicit name (listmonk_stage_bridge) to prevent
# Docker from assigning the same default name as prod's bridge, which caused
# DNS round-robin between prod and stage containers and intermittent
# "password authentication failed" errors from listmonk_db.

x-listmonk_db-credentials: &listmonk_db-credentials
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

services:

  api:
    image: ghcr.io/ailianbr/monk-api:stg
    container_name: stg_listmonk_api
    pull_policy: always
    environment:
      - ENVIRONMENT=stg
      - LISTMONK_API_URL=${LISTMONK_API_URL}
      - POCKETBASE_BOT_EMAIL=${POCKETBASE_BOT_EMAIL}
      - POCKETBASE_BOT_PASSWORD=${POCKETBASE_BOT_PASSWORD}
      - POCKETBASE_API_URL=${POCKETBASE_API_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    # LISTMONK_USER/TOKEN are minted by listmonk-init into the shared `stg_seed_env`
    # volume; source them at startup so the deployed API can reach Listmonk.
    command: ["sh", "-c", "set -a; . /seed/.env.local; set +a; exec python /services/api/main.py"]
    expose:
      - 8000
    depends_on:
      listmonk_app:
        condition: service_healthy
      pocketbase:
        condition: service_healthy
      listmonk-init:
        condition: service_completed_successfully
    volumes:
      - stg_seed_env:/seed:ro
    networks:
      bridge: null
      observability:
        aliases:
          - stg_listmonk_api
      dokploy-network:
        aliases:
          - stg_listmonk_api

  # One-shot: provisions the `monk_api` Listmonk API user and writes
  # LISTMONK_USER/LISTMONK_TOKEN into the shared seed volume the api sources.
  # Mirrors the dev stack (docker-compose.yml) so those creds never need to live
  # in Doppler/Dockploy. Re-mints (delete + recreate) the token on every deploy.
  listmonk-init:
    image: python:3.12-alpine
    depends_on:
      listmonk_app:
        condition: service_healthy
    environment:
      LISTMONK_URL: http://listmonk_app:9000
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD}
      ENV_LOCAL_PATH: /seed/.env.local
    volumes:
      - ./tools/dev/listmonk_init.py:/listmonk_init.py:ro
      - stg_seed_env:/seed
    command: ["python", "/listmonk_init.py"]
    restart: "no"
    networks:
      - bridge

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.36.7  # pinned (matches dev; verified schema import)
    container_name: stg_listmonk_api_db
    restart: unless-stopped
    command:
      - --encryptionEnv
      - ENCRYPTION
    environment:
      - ENCRYPTION=${PB_ENCRYPTION}
      - PB_INVITATION_PEPPER=${PB_INVITATION_PEPPER}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - ENVIROMENT=${ENVIROMENT}
      # Bootstrap the superuser the app authenticates as (POCKETBASE_BOT_*), so
      # _ensure_pb_auth() succeeds on a fresh stg PB. Import the schema once after
      # first deploy with scripts/provision-pb-schema.sh stg.
      - PB_ADMIN_EMAIL=${POCKETBASE_BOT_EMAIL}
      - PB_ADMIN_PASSWORD=${POCKETBASE_BOT_PASSWORD}
    expose:
      - 8090
    volumes:
      - stg_listmonk_api_db:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      bridge: null
      observability:
        aliases:
          - stg_pocketbase
      dokploy-network:
        aliases:
          - stg_listmonk_api_db

  listmonk_app:
    image: listmonk/listmonk:v6.0.0
    container_name: stg_listmonk_app
    restart: unless-stopped
    expose:
      - 9000
    networks:
      bridge: null
      observability:
        aliases:
          - stg_listmonk_app
      dokploy-network:
        aliases:
          - stg_listmonk_app
    hostname: listmonk.ailian.com.br
    depends_on:
      - listmonk_db
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
    environment:
      LISTMONK_app__address: ${LISTMONK_APP_ADDRESS}
      LISTMONK_db__user: ${LISTMONK_DB_USER}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD}
      LISTMONK_db__database: ${LISTMONK_DB_DATABSE}
      LISTMONK_db__host: ${LISTMONK_DB_HOST}
      LISTMONK_db__port: ${LISTMONK_DB_PORT}
      LISTMONK_db__ssl_mode: ${LISTMONK_DB_SSL_MODE}
      LISTMONK_db__max_open: ${LISTMONK_DB_MAX_OPEN}
      LISTMONK_db__max_idle: ${LISTMONK_DB_MAX_IDLE}
      LISTMONK_db__max_lifetime: ${LISTMONK_DB_MAX_LIFETIME}
      TZ: Etc/UTC
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ./uploads:/listmonk/uploads:rw

  listmonk_db:
    image: postgres:17-alpine
    container_name: stg_listmonk_db
    restart: unless-stopped
    expose:
      - 5432
    networks:
      bridge: null
      dokploy-network:
        aliases:
          - stg_listmonk_db
    environment:
      <<: *listmonk_db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: stg_listmonk-data
        target: /var/lib/postgresql/data

networks:
  bridge:
    name: listmonk_stage_bridge
  observability:
    external: true
  dokploy-network:
    external: true

volumes:
  stg_listmonk_api_db:
  stg_listmonk-data:
  stg_seed_env:
