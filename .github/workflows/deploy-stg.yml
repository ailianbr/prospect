name: Deploy Staging

on:
  push:
    branches: [development]

concurrency:
  group: stg-integration-tests
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        working-directory: services/api
        run: pdm install --dev

      - name: Lint
        working-directory: services/api
        run: pdm run task lint

  test:
    needs: lint
    uses: ./.github/workflows/integration-test.yml

  deploy-stg:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: services/api

      - name: Generate coverage badge
        run: |
          pip install genbadge[coverage]
          genbadge coverage -i services/api/coverage.xml -o badges/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: ghcr.io/${{ env.OWNER }}/monk-api:stg

      # Force a redeploy via the Dokploy API (not the plain webhook): on git-source
      # composes the webhook is a no-op when the git SHA is unchanged, so pull_policy
      # never re-pulls the freshly-built image. compose.deploy re-pulls + recreates.
      # composeId is the `porspect-stg` compose; update it if that compose is recreated.
      - name: Redeploy staging (Dokploy force redeploy)
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          code=$(curl -sS -o /tmp/deploy.out -w '%{http_code}' -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" -H 'content-type: application/json' \
            -d '{"composeId":"cbu5F_AtfwjD7N5RNTfvH"}' \
            https://admin.ailian.com.br/api/compose.deploy)
          echo "compose.deploy -> HTTP $code"; cat /tmp/deploy.out 2>/dev/null; echo
          case "$code" in 2*) echo "staging redeploy triggered";; *) echo "::error::Dokploy compose.deploy failed ($code)"; exit 1;; esac
