name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: stg-integration-tests
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/integration-test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Read version and normalize owner
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#monk-api-v}"
          else
            VERSION=$(grep '^version' services/api/pyproject.toml | sed 's/version = "//;s/"//')
          fi
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:v${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:latest

      - name: Deploy to production (Dockploy)
        run: doppler run -- sh -c 'curl -s -X GET "$DOCKPLOY_WEBHOOK"'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
