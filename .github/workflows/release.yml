name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: stg-integration-tests
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/integration-test.yml

  # Smoke gate: production is only built/deployed if the LIVE staging stack is
  # healthy. No auth needed — these are public endpoints of the deployed stg env.
  verify-stg:
    runs-on: ubuntu-latest
    steps:
      - name: Smoke-check the live staging stack
        run: |
          fail=0
          check() {
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 25 "$1" || echo 000)
            printf '  %-4s %s\n' "$code" "$1"
            [ "$code" = "$2" ] || { echo "::error::expected $2 from $1, got $code"; fail=1; }
          }
          check https://stg-listmonkapi.ailian.com.br/docs 200
          check https://stg-listmonkapi.ailian.com.br/openapi.json 200
          check https://stg-listmonk.ailian.com.br/ 200
          check https://stg-listmonkdb.ailian.com.br/api/health 200
          # Confirm the monk-api actually serves its FastAPI schema (not just a proxy 200).
          curl -sS --max-time 25 https://stg-listmonkapi.ailian.com.br/openapi.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('info',{}).get('title') and d.get('paths'); print('  openapi ok: version', d['info']['version'], '| paths', len(d['paths']))" \
            || { echo '::error::stg monk-api is not serving its OpenAPI schema'; fail=1; }
          exit $fail

  release:
    needs: [test, verify-stg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version and normalize owner
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#monk-api-v}"
          else
            VERSION=$(grep '^version' services/api/pyproject.toml | sed 's/version = "//;s/"//')
          fi
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:v${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/monk-api:latest

      # Force a redeploy via the Dokploy API (not the plain webhook): on git-source
      # composes the webhook is a no-op when the git SHA is unchanged, so pull_policy
      # never re-pulls the freshly-built image. compose.deploy re-pulls + recreates.
      # composeId is the `prospect-prd` compose; update it if that compose is recreated.
      - name: Deploy to production (Dokploy force redeploy)
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          code=$(curl -sS -o /tmp/deploy.out -w '%{http_code}' -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" -H 'content-type: application/json' \
            -d '{"composeId":"OAw8rLfHdOytKhO0mXuMg"}' \
            https://admin.ailian.com.br/api/compose.deploy)
          echo "compose.deploy -> HTTP $code"; cat /tmp/deploy.out 2>/dev/null; echo
          case "$code" in 2*) echo "prod redeploy triggered";; *) echo "::error::Dokploy compose.deploy failed ($code)"; exit 1;; esac
