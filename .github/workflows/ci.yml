name: CI

on:
  pull_request:
    branches: [main, development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        working-directory: services/api
        run: pdm install --dev

      - name: Lint
        working-directory: services/api
        run: pdm run task lint

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.stg.yml config -q
          docker compose -f docker-compose.prd.yml config -q

  test:
    needs: lint
    uses: ./.github/workflows/integration-test.yml

