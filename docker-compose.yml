x-listmonk_db-credentials: &listmonk_db-credentials                             # Use the default POSTGRES_ credentials if they're available or simply default to "listmonk"
  POSTGRES_USER: &db-user ${POSTGRES_USER}                            # for database user, password, and database name
  POSTGRES_PASSWORD: &db-password ${POSTGRES_PASSWORD}
  POSTGRES_DB: &db-name ${POSTGRES_DB}

services:

  api:
    image: ghcr.io/ailianbr/monk-api:latest
    build:
      context: ./services/api
    environment:
      - ENVIRONMENT=dev
      - LISTMONK_API_URL=${LISTMONK_API_URL}
      - POCKETBASE_BOT_EMAIL=${POCKETBASE_BOT_EMAIL}
      - POCKETBASE_BOT_PASSWORD=${POCKETBASE_BOT_PASSWORD}
      - POCKETBASE_API_URL=${POCKETBASE_API_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    # LISTMONK_USER/TOKEN are minted by listmonk-init into the shared `seed_env`
    # volume; source them at startup so a plain `docker compose up` works end-to-end.
    command: ["sh", "-c", "set -a; . /seed/.env.local; set +a; exec python /services/api/main.py"]
    depends_on:
      listmonk_app:
        condition: service_healthy
      pocketbase:
        condition: service_healthy
      pb-init:
        condition: service_completed_successfully
      listmonk-init:
        condition: service_completed_successfully
    ports:
      - 8000:8000
    develop:
      watch:
        - action: sync
          path: ./services/api/app
          target: /services/api/app
        - action: sync
          path: ./services/api/tests
          target: /services/api/tests
        - action: rebuild
          path: ./services/api/Dockerfile
        - action: rebuild
          path: ./services/api/pdm.lock

    volumes:
      - seed_env:/seed:ro
    networks:
      - bridge

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.36.7  # pinned for reproducibility
    restart: unless-stopped
    command:
      - --encryptionEnv
      - ENCRYPTION
    environment:
      - ENCRYPTION=${ENCRYPTION}
      - PB_INVITATION_PEPPER=${PB_INVITATION_PEPPER}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - ENVIROMENT=${ENVIROMENT}
      # Bootstrap the superuser the app authenticates as (POCKETBASE_BOT_*), so
      # _ensure_pb_auth() succeeds on a fresh PB with no manual admin setup.
      - PB_ADMIN_EMAIL=${POCKETBASE_BOT_EMAIL}
      - PB_ADMIN_PASSWORD=${POCKETBASE_BOT_PASSWORD}
    ports:
      - 8090:8090
    volumes:
      - pocketbase:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bridge
  
  listmonk_app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s   # install/upgrade runs on first boot; don't fail probes during it
    ports:
      - 9000:9000                                          # To change the externally exposed port, change to: $custom_port:9000
    networks:
      - bridge
    hostname: listmonk.ailian.com.br                            # Recommend using FQDN for hostname
    depends_on:
      - listmonk_db
    command: [sh, -c, "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''"]
                                                              # --config (file) param is set to empty so that listmonk only uses the env vars (below) for config.
                                                              # --install --idempotent ensures that DB installation happens only once on an empty DB, on the first ever start.
                                                              # --upgrade automatically runs any DB migrations when a new image is pulled.

    environment:                                              # The same params as in config.toml are passed as env vars here.
      LISTMONK_app__address: ${LISTMONK_APP_ADDRESS}
      LISTMONK_db__user: ${LISTMONK_DB_USER}
      LISTMONK_db__password: ${LISTMONK_DB_PASSWORD}
      LISTMONK_db__database: ${LISTMONK_DB_DATABSE}
      LISTMONK_db__host: ${LISTMONK_DB_HOST}
      LISTMONK_db__port: ${LISTMONK_DB_PORT}
      LISTMONK_db__ssl_mode: ${LISTMONK_DB_SSL_MODE}
      LISTMONK_db__max_open: ${LISTMONK_DB_MAX_OPEN}
      LISTMONK_db__max_idle: ${LISTMONK_DB_MAX_IDLE}
      LISTMONK_db__max_lifetime: ${LISTMONK_DB_MAX_LIFETIME}
      TZ: Etc/UTC
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}           # If these (optional) are set during the first `docker compose up`, then the Super Admin user is automatically created.
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}   # Otherwise, the user can be setup on the web app after the first visit to http://localhost:9000
    volumes:
      - ./uploads:/listmonk/uploads:rw                        # Mount an uploads directory on the host to /listmonk/uploads inside the container.
                                                              # To use this, change directory path in Admin -> Settings -> Media to /listmonk/uploads
 
  lgtm:
    profiles: [otel]
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - "3005:3000"   # Grafana UI
      - "4317:4317"   # OTLP/gRPC receiver
    networks:
      - bridge

  listmonk_db:
    image: postgres:17-alpine
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"                                 # Only bind on the local interface. To connect to Postgres externally, change this to 0.0.0.0
    networks:
      - bridge
    environment:
      <<: *listmonk_db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - type: volume
        source: listmonk-data
        target: /var/lib/postgresql/data

  # ── dev seeding (one-shot, idempotent) — mirrors conectai's pb-init ──────────
  # Both run to completion before `api` starts (it depends_on them with
  # service_completed_successfully), so a fresh `up` is fully self-sufficient —
  # no manual PocketBase admin or Listmonk API-token setup.
  #   pb-init      : import the dev/test schema (pb_schema.dev.json) + seed the chatwoot
  #                  instance graph so the chatwoot integration/channel tests run green.
  #   listmonk-init: mint a Listmonk API user and write LISTMONK_USER/TOKEN into
  #                  the shared `seed_env` volume, which `api` sources at startup.
  pb-init:
    image: python:3.12-alpine
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      PB_URL: ${POCKETBASE_API_URL}
      PB_ADMIN_EMAIL: ${POCKETBASE_BOT_EMAIL}
      PB_ADMIN_PASSWORD: ${POCKETBASE_BOT_PASSWORD}
      SCHEMA_PATH: /schema.json
      TEST_CHATWOOT_INSTANCE_ID: ${TEST_CHATWOOT_INSTANCE_ID:-87v79w2os56q298}
    volumes:
      - ./tools/dev/pb_init.py:/pb_init.py:ro
      - ./tools/dev/seed_chatwoot.py:/seed_chatwoot.py:ro
      - ./services/pocketbase/pb_schema.dev.json:/schema.json:ro
    command: ["sh", "-c", "python /pb_init.py && python /seed_chatwoot.py"]
    restart: "no"
    networks:
      - bridge

  listmonk-init:
    image: python:3.12-alpine
    depends_on:
      listmonk_app:
        condition: service_healthy
    environment:
      LISTMONK_URL: http://listmonk_app:9000
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD}
      ENV_LOCAL_PATH: /seed/.env.local
    volumes:
      - ./tools/dev/listmonk_init.py:/listmonk_init.py:ro
      - seed_env:/seed
    command: ["python", "/listmonk_init.py"]
    restart: "no"
    networks:
      - bridge

networks:
  bridge:

volumes:
  claude_enviroment:
    external: true
  pocketbase:
  listmonk-data:
  seed_env:

